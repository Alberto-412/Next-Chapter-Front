<div class="sidebar" [class.open]="menuOpen">

    <div class="sidebar-logo">
        <img src="image/nextchapter_logo_vertical_next_chapter_white.png" alt="NextChapter" />
        <span class="sidebar-subtitle">Panel de administración</span>
    </div>

    <nav class="sidebar-nav">
        <a routerLink="/admin/dashboard" routerLinkActive="active">
            <span class="material-symbols-outlined">home</span>
            <span class="label">Dashboard</span>
        </a>
        <a routerLink="/admin/pedidos" routerLinkActive="active">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span class="label">Pedidos</span>
        </a>
        <a routerLink="/admin/productos" routerLinkActive="active">
            <span class="material-symbols-outlined">book_2</span>
            <span class="label">Productos</span>
        </a>
        <a routerLink="/admin/usuarios" routerLinkActive="active">
            <span class="material-symbols-outlined">assignment_ind</span>
            <span class="label">Usuarios</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="#" (click)="$event.preventDefault()">
            <span class="material-symbols-outlined">help</span>
            <span class="label">Ayuda</span>
        </a>
        <button class="logout-btn" (click)="logout()">
            <span class="material-symbols-outlined">logout</span>
            <span class="label">Cerrar sesión</span>
        </button>
    </div>

</div>

<div class="sidebar-overlay" [class.visible]="menuOpen" (click)="toggleMenu()"></div>
