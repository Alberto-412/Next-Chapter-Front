<div class="admin-layout">
    <app-sidebar-admin #sidebar (menuToggled)="onMenuToggled($event)" />
    <div class="admin-main">
        <header class="admin-header">
            <div class="admin-header-left">
                <button class="hamburger" (click)="sidebar.toggleMenu()">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="mobile-logo">
                    <img src="image/nextchapter_logo_vertical_next_chapter_black.png" alt="NextChapter" />
                </div>
            </div>
            <div class="admin-header-search">
                <span class="material-symbols-outlined">search</span>
                <input type="text" [placeholder]="searchPlaceholder" (input)="onBuscar($event)" />
            </div>
            <div class="admin-header-right">
                <div class="admin-profile">
                    <div class="admin-profile-info">
                        <span class="admin-name">Admin</span>
                        <span class="admin-role">Administrador</span>
                    </div>
                    <div class="admin-avatar">A</div>
                </div>
            </div>
        </header>
        <main class="admin-content">
            <router-outlet />
        </main>
    </div>
</div>
