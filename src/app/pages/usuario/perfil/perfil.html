<div class="perfil-container">
    <h1>Mi Perfil</h1>

    @if (mensaje) {
    <p class="mensaje-ok">{{ mensaje }}</p>
    }
    @if (error) {
    <p class="mensaje-error">{{ error }}</p>
    }

    <!-- DATOS DEL PERFIL -->
    @if (perfil && !modoEdicion && !modoPassword) {
    <div>
        <p><strong>Nombre:</strong> {{ perfil.nombre }}</p>
        <p><strong>Email:</strong> {{ perfil.mail }}</p>
        <p><strong>Rol:</strong> {{ perfil.rol }}</p>
        <button (click)="editarPerfil()">Editar perfil</button>
        <button (click)="mostrarCambioPassword()">Cambiar contraseña</button>
        <button (click)="darDeBaja()">Darme de baja</button>
    </div>
    }

    <!-- EDICIÓN DE PERFIL -->
    @if (modoEdicion) {
    <div>
        <h2>Editar perfil</h2>
        <label>Nombre</label>
        <input [(ngModel)]="datosPerfil.nombre" />
        <label>Email</label>
        <input [(ngModel)]="datosPerfil.mail" />
        <button (click)="guardarPerfil()">Guardar</button>
        <button (click)="cancelar()">Cancelar</button>
    </div>
    }

    <!-- CAMBIO DE CONTRASEÑA -->
    @if (modoPassword) {
    <div>
        <h2>Cambiar contraseña</h2>
        <label>Contraseña actual</label>
        <input type="password" [(ngModel)]="datosPassword.contrasenaActual" />
        <label>Contraseña nueva</label>
        <input type="password" [(ngModel)]="datosPassword.contrasenaNueva" />
        <button (click)="cambiarPassword()">Guardar</button>
        <button (click)="cancelar()">Cancelar</button>
    </div>
    }

</div>
